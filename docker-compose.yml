# ============================================================
# GHP IT Hub — Local / On-Premise development stack
# Layers mirror cloude.md §3: App (Django) + DB (PostgreSQL)
# + Cache/Broker (Redis) + Async workers (Celery / Celery beat).
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ghp_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ghp_it_hub}
      POSTGRES_USER: ${POSTGRES_USER:-ghp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghp_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghp} -d ${POSTGRES_DB:-ghp_it_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ghp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghp_backend
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghp_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghp_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
